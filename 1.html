<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>履歷表</title>

<style>
body{
    margin:0;
    font-family: Arial, "Microsoft JhengHei", sans-serif;
    background:#f3f4f6;
}

/* 上方封面 */
.banner{
    width:100%;
    height:200px;
    background:url("images/banner.jpg") center/cover no-repeat;
}

/* 頭像 */
.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid white;
    position:absolute;
    top:140px;
    left:50%;
    transform:translateX(-50%);
    object-fit:cover;
}

/* 卡片 */
.card{
    max-width:800px;
    margin:80px auto 20px;
    background:white;
    border-radius:10px;
    padding:30px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

.name{
    font-size:26px;
    margin-top:60px;
}

.title{
    color:#666;
    margin:5px 0 15px;
}

.info{
    font-size:14px;
    color:#555;
}

/* 區塊 */
.section{
    max-width:800px;
    margin:15px auto;
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.section h2{
    font-size:18px;
    border-bottom:1px solid #ddd;
    padding-bottom:10px;
    margin-bottom:10px;
}

/* 列表 */
.item{
    margin-bottom:15px;
}

.item-title{
    font-weight:bold;
}

.item-time{
    color:#888;
    font-size:13px;
}

</style>
</head>

<body>

<!-- 封面 -->
<div class="banner"></div>

<!-- 頭像 -->
<img src="images/S__1245187.jpg" class="avatar">

<!-- 個人卡 -->
<div class="card">
    <div class="name">温凡儀</div>
    <div class="title">亞洲大學學生</div>
    <div class="info">
        📞 0912-345-678 ｜ ✉️ fwen019@gmail.com ｜ 📍 台灣
    </div>
</div>

<!-- 自我介紹 -->
<div class="section">
    <h2>個人簡介</h2>
    <p>
        我是亞洲大學學生，對程式設計與網頁開發充滿興趣，
        持續學習前端與後端技術，希望未來能成為軟體工程師。
    </p>
</div>

<!-- 學歷 -->
<div class="section">
    <h2>學歷</h2>

    <div class="item">
        <div class="item-title">亞洲大學</div>
        <div>資訊相關科系</div>
        <div class="item-time">2023 - 就讀中</div>
    </div>

    <div class="item">
        <div class="item-title">高中</div>
        <div>一般高中</div>
        <div class="item-time">2019 - 2023</div>
    </div>

</div>

<!-- 工作經歷 -->
<div class="section">
    <h2>工作經歷</h2>

    <div class="item">
        <div class="item-title">餐飲服務員</div>
        <div>負責點餐與服務</div>
        <div class="item-time">2021 - 2022</div>
    </div>

</div>

<!-- 技能 -->
<div class="section">
    <h2>技能</h2>
    <p>HTML / CSS / JavaScript / Python</p>
</div>

</body>
</html>
