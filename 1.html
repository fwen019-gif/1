<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>履歷表</title>

<style>
body{
    margin:0;
    font-family: Arial, "Microsoft JhengHei", sans-serif;
    background:#e5e7eb;
}

/* 整體版面 */
.container{
    display:flex;
    max-width:1000px;
    margin:40px auto;
    background:white;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* 左側欄 */
.sidebar{
    width:35%;
    background:#2f3b52;
    color:white;
    padding:30px 20px;
    text-align:center;
}

/* 頭像 */
.avatar{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
}

/* 名字 */
.name{
    font-size:26px;
    margin-top:15px;
}

.job{
    margin:10px 0;
    font-size:14px;
    opacity:0.8;
}

/* 左側區塊 */
.sidebar-section{
    margin-top:25px;
    text-align:left;
}

.sidebar-section h3{
    border-bottom:1px solid rgba(255,255,255,0.3);
    padding-bottom:5px;
    margin-bottom:10px;
}

.sidebar-section p{
    font-size:14px;
    margin:6px 0;
}

/* 右側內容 */
.main{
    width:65%;
    padding:30px;
}

/* 區塊標題 */
.section{
    margin-bottom:25px;
}

.section h2{
    background:#2f3b52;
    color:white;
    display:inline-block;
    padding:5px 15px;
    border-radius:20px;
    font-size:16px;
}

/* 內容 */
.section p{
    margin-top:10px;
    color:#333;
    line-height:1.6;
}

/* 時間線 */
.timeline{
    margin-top:10px;
}

.timeline p{
    margin:6px 0;
}

/* 技能 */
.skills span{
    display:inline-block;
    background:#2f3b52;
    color:white;
    padding:6px 10px;
    margin:5px;
    border-radius:20px;
    font-size:13px;
}

/* 興趣 */
.hobby span{
    display:inline-block;
    background:#2f3b52;
    color:white;
    width:70px;
    height:70px;
    line-height:70px;
    text-align:center;
    border-radius:50%;
    margin:10px;
}

</style>
</head>

<body>

<div class="container">

    <!-- 左側 -->
    <div class="sidebar">

        <img src="images/S__1245187.jpg" class="avatar">

        <div class="name">温凡儀</div>
        <div class="job">創意設計師</div>

        <div class="sidebar-section">
            <h3>聯絡資訊</h3>
            <p>📞 0979-810756</p>
            <p>✉️ chockchou@gmail.com</p>
            <p>📍 台灣</p>
        </div>

        <div class="sidebar-section">
            <h3>技能</h3>
            <p>HTML / CSS</p>
            <p>JavaScript</p>
            <p>Python</p>
        </div>

        <div class="sidebar-section">
            <h3>自我評價</h3>
            <p>具備創意與學習能力，對設計與程式充滿熱情。</p>
        </div>

    </div>

    <!-- 右側 -->
    <div class="main">

        <div class="section">
            <h2>教育經歷</h2>
            <div class="timeline">
                <p>2019 - 高中畢業</p>
                <p>2023 - 亞洲大學（就讀中）</p>
            </div>
        </div>

        <div class="section">
            <h2>工作經歷</h2>
            <div class="timeline">
                <p>2016 - 工讀經驗</p>
                <p>2019 - 餐飲業服務</p>
                <p>2021 - 接案設計</p>
            </div>
        </div>

        <div class="section">
            <h2>專業技能</h2>
            <div class="skills">
                <span>HTML</span>
                <span>CSS</span>
                <span>JavaScript</span>
                <span>UI設計</span>
            </div>
        </div>

        <div class="section">
            <h2>興趣愛好</h2>
            <div class="hobby">
                <span>桌球</span>
                <span>跑步</span>
                <span>美食</span>
            </div>
        </div>

    </div>

</div>

</body>
</html>
